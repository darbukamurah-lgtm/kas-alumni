<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Data Anggota - Kas Alumni</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="anggota.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="anggota.js"></script>
</head>

<body>

    <div class="header">
        <span>ANGGOTA ALUMNI</span>
        <button id="btnLogout" class="btn-logout">
            <span class="material-icons">power_settings_new</span>
        </button>
    </div>

    <div class="content">
        <div class="search-container">
            <span class="material-icons">search</span>
            <input type="text" id="searchInput" placeholder="Cari nama alumni...">
        </div>

        <div class="filter-wrapper">
            <button class="filter-btn active" id="btnFilterAll">Semua</button>
            <button class="filter-btn" id="btnFilterLunas">Lunas</button>
            <button class="filter-btn" id="btnFilterBelum">Belum</button>
        </div>

        <div id="anggotaList" class="list-container">
            </div>
    </div>

    <nav class="navbar-premium">
        <div class="nav-item" id="navDash">
            <span class="material-icons">dashboard</span>
            <span>Dashboard</span>
        </div>
        
        <div class="nav-item active" id="navAnggota">
            <span class="material-icons">groups</span>
            <span>Anggota</span>
        </div>

        <div class="nav-center">
            <div class="center-btn" id="navTransaksi">
                <span class="material-icons">payments</span>
            </div>
        </div>

        <div class="nav-item" id="navAgenda">
            <span class="material-icons">event_note</span>
            <span>Agenda</span>
        </div>
        
        <div class="nav-item" id="navLaporan">
            <span class="material-icons">analytics</span>
            <span>Laporan</span>
        </div>
    </nav>

    <button id="btnTambahAnggota">
        <span class="material-icons">person_add</span>
    </button>

    <div id="modalAnggota" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Tambah Anggota</h3>
            <input type="hidden" id="editId">
            
            <div style="margin-top: 15px;">
                <label>Nama Lengkap</label>
                <input type="text" id="inputNama" placeholder="Contoh: Budi Santoso">
            </div>
            
            <div>
                <label>Target Iuran (Fixed)</label>
                <input type="number" id="inputIuran" value="50000" readonly>
            </div>

            <div class="modal-footer">
    <button id="btnSimpan" class="btn-primary-modal">Simpan</button>
    <button id="btnBatal" class="btn-secondary-modal">Batal</button>
</div>

            
            <button id="btnHapus">Hapus Anggota</button>
        </div>
    </div>

<style>
    /* Gunakan ID supaya tidak bentrok dengan modal CRUD */
    #modalLogout.modal {
        display: none; 
        position: fixed;
        z-index: 9999;
        left: 0; top: 0; width: 100%; height: 100%;
        background-color: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
    }

    #modalLogout.show {
        display: flex !important;
        opacity: 1;
        pointer-events: auto;
    }

    #modalLogout .modal-content {
        background-color: #ffffff;
        padding: 24px;
        border-radius: 24px;
        width: 85%;
        max-width: 340px;
        text-align: center;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        transform: scale(0.8);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #modalLogout.show .modal-content {
        transform: scale(1);
    }

    #modalLogout h3 {
        margin-top: 0;
        color: #1e293b;
        font-size: 18px;
        font-weight: 700;
    }

    #modalLogout p {
        color: #64748b;
        font-size: 14px;
        margin-bottom: 24px;
    }

    #modalLogout .modal-footer {
        display: flex;
        gap: 12px;
    }

    #modalLogout .btn-secondary {
        flex: 1;
        background: #f1f5f9;
        color: #475569;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
    }

    #modalLogout .btn-danger {
        flex: 1;
        background: #ef4444;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
    }

    #modalLogout .btn-danger:active, 
    #modalLogout .btn-secondary:active {
        transform: scale(0.95);
    }
</style>

<div id="modalLogout" class="modal">
    <div class="modal-content">
        <h3>Keluar Aplikasi?</h3>
        <p>Yakin mau logout sekarang, Boss?</p>
        <div class="modal-footer">
            <button id="cancelLogout" class="btn-secondary">Batal</button>
            <button id="confirmLogout" class="btn-danger">Ya, Logout</button>
        </div>
    </div>
</div>
<div id="modalAlert" class="modal">
    <div class="modal-content" style="text-align: center;">
        <div style="background: #fee2e2; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <span class="material-icons" style="color: #ef4444; font-size: 30px;">priority_high</span>
        </div>
        <h3 id="alertTitle" style="margin-bottom: 8px;">Peringatan</h3>
        <p id="alertMessage" style="color: #64748b; font-size: 14px; margin-bottom: 20px;"></p>
        <button id="btnTutupAlert" class="btn-primary-modal" style="width: 100%;">Oke, Paham</button>
    </div>
</div>

<div id="modalHapus" class="modal">
    <div class="modal-content" style="text-align: center;">
        <div style="background: #fee2e2; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <span class="material-icons" style="color: #ef4444; font-size: 30px;">delete_forever</span>
        </div>
        <h3>Hapus Alumni?</h3>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Data alumni ini bakal ilang permanen, yakin Boss?</p>
        <div class="modal-footer" style="display: flex; gap: 10px;">
            <button id="btnProsesHapus" class="btn-danger" style="flex: 1; border-radius: 12px; padding: 12px; border: none; font-weight: 700;">Ya, Hapus</button>
            <button id="btnBatalHapus" class="btn-secondary" style="flex: 1; border-radius: 12px; padding: 12px; border: none; font-weight: 700;">Batal</button>
        </div>
    </div>
</div>


</body>
</html>
