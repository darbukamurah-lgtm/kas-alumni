<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Kaspro</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="agenda.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="agenda.js"></script>

</head>
<body>

<div class="app-container">

    <!-- HEADER -->
    <header class="header">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
        <h2>Agenda Kaspro</h2>
    </header>

    <!-- FEATURED -->
    <section class="featured-agenda">
        <div class="next-event-card">
            <p>Agenda Terdekat</p>
            <h3 id="featTitle">-</h3>
            <div class="event-meta">
                <span id="featDate"><i class="fa-regular fa-calendar"></i> -</span>
                <span id="featTime"><i class="fa-regular fa-clock"></i> -</span>
            </div>
        </div>
    </section>

    <!-- FILTER -->
    <div class="filter-wrapper">
        <div class="filter-container">
            <div class="month-chip active" data-month="all">Semua</div>
            <div class="month-chip" data-month="jAN">Januari</div>
            <div class="month-chip" data-month="FEB">Februari</div>
            <div class="month-chip" data-month="MAR">Maret</div>
            <div class="month-chip" data-month="APR">April</div>
            <div class="month-chip" data-month="MEI">Mei</div>
            <div class="month-chip" data-month="JUN">Juni</div>
            <div class="month-chip" data-month="JUL">Juli</div>
            <div class="month-chip" data-month="AGT">Agustus</div>
            <div class="month-chip" data-month="SEP">September</div>
            <div class="month-chip" data-month="OKT">Oktober</div>
            <div class="month-chip" data-month="NOV">November</div>
            <div class="month-chip" data-month="DES">Desember</div>
        </div>
    </div>

    <!-- LIST -->
    <section class="agenda-section">
        <h3 class="section-title">Timeline Kegiatan</h3>

        <div id="agendaList"></div>

        <div id="emptyState">
            <i class="fa-regular fa-calendar-xmark"></i>
            <p>Belum ada agenda untuk bulan ini.</p>
        </div>
    </section>

</div>
<div class="bottom-nav">

  <a href="index.html" class="nav-item">
    <span class="material-symbols-rounded">home</span>
    <p>Home</p>
  </a>

  <a href="history.html" class="nav-item">
    <span class="material-symbols-rounded">receipt_long</span>
    <p>History</p>
  </a>

  <a href="bayar.html" class="nav-center">
    <span class="material-symbols-rounded">qr_code_scanner</span>
  </a>

  <a href="agenda.html" class="nav-item active">
    <span class="material-symbols-rounded">event</span>
    <p>Agenda</p>
  </a>

  <a href="anggota.html" class="nav-item">
    <span class="material-symbols-rounded">groups</span>
    <p>Anggota</p>
  </a>

</div>

</body>
</html>
