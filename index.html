<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas Alumni - Upgrade Sistem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-out;
        }
        .icon-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            width: 100px;
            height: 100px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
            font-size: 50px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            max-width: 350px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .progress-container {
            height: 6px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            position: absolute;
            width: 50%;
            height: 100%;
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
            border-radius: 10px;
            animation: loading 2s infinite ease-in-out;
        }
        .status-text {
            font-size: 12px;
            margin-top: 12px;
            color: #64748b;
            font-weight: 500;
        }
        .footer-text {
            margin-top: 50px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #3b82f6;
            font-weight: bold;
            opacity: 0.8;
        }
        @keyframes loading {
            0% { left: -50%; }
            100% { left: 100%; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

       <div class="container">
        <div class="icon-box">🛠️</div>
        
        <h1>Upgrade Sistem</h1>

        <div class="card">
            <p>
                Sabar ya <b>Guys</b>, web aplikasi sedang dipindahkan ke struktur baru agar lebih ringan dan bebas error.
            </p>
            
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div class="status-text">Tahap: Pemisahan Modul Halaman</div>
        </div>

        <div style="margin-top: 50px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="font-size: 12px; color: #3b82f6; font-weight: bold; letter-spacing: 1.5px; margin-bottom: 5px; text-transform: uppercase;">
                Web Kas Alumni Santri Al Hidayah v2.0
            </p>
            <p style="font-size: 11px; color: #64748b; margin-bottom: 10px;">
                Copyright &copy; 2026 - Santri Production
            </p>
            
            <a href="https://wa.me/6285875105266" style="text-decoration: none; display: inline-flex; align-items: center; gap: 8px; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); padding: 8px 15px; border-radius: 50px; color: #22c55e; font-size: 12px; font-weight: 600; transition: 0.3s;">
                <span style="font-size: 14px;">💬</span> Hubungi WhatsApp
            </a>
        </div>
    </div>


</body>
</html>
