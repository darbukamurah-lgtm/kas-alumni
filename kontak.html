<!DOCTYPE html>

<head>

    <title>Hubungi Kami | Santri Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #10b981; --glass: rgba(255, 255, 255, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: var(--primary); }
        
        header { 
            padding: 60px 20px; 
            text-align: center; 
            background: #0f172a; 
            color: white; 
            border-bottom: 4px solid var(--accent);
        }

        .container { max-width: 600px; margin: -30px auto 40px; padding: 0 20px; }
        
        .contact-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid white;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: 0.3s;
            text-decoration: none;
            color: var(--primary);
        }

        .contact-item:hover { border-color: var(--accent); transform: translateX(5px); }
        .icon { font-size: 1.5rem; margin-right: 20px; }
        .info-text h3 { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .info-text p { font-weight: 600; font-size: 0.6rem; margin-top:3px;}

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
